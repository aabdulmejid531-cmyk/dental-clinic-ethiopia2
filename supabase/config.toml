# Supabase local development config
# Run migrations: supabase db push (after linking your project)

project_id = "dental-clinic-ethiopia"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/login", "https://*.vercel.app/login"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
